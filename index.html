<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ECG Biomedical Analyzer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <h1>ECG Biomedical Analyzer</h1>

    <canvas id="canvas"></canvas>

    <div class="controls">

        <button onclick="toggle()">Start / Stop</button>
        <button onclick="exportPDF()">Export PDF Report</button>

    </div>

    <div class="stats">
        <div id="bpm">BPM: --</div>
        <div id="risk">Risk Index: --</div>
        <div id="alarm">Alarm: --</div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
