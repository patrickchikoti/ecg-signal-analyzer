<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ECG Biomedical Analyzer</title>

<!-- PDF LIBRARY (REQUIRED FOR EXPORT) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <h1>ECG Biomedical Analyzer</h1>

    <!-- MAIN ECG GRAPH -->
    <canvas id="canvas"></canvas>

    <!-- LOWER SIGNAL SPECTRUM -->
    <canvas id="spectrum"></canvas>

    <!-- CONTROLS -->
    <div class="controls">

        <button onclick="toggle()">Start / Stop</button>
        <button onclick="switchPatient()">Switch Patient</button>
        <button onclick="exportPDF()">Export PDF Report</button>

    </div>

    <!-- LIVE STATS -->
    <div class="stats">

        <div id="bpm">BPM: --</div>
        <div id="risk">Risk Index: --</div>

        <!-- IMPORTANT: ONLY ONE alarm ID (FIXED BUG YOU HAD BEFORE) -->
        <div id="alarm">Alarm: --</div>

    </div>

</div>

<!-- MAIN SCRIPT -->
<script src="script.js"></script>

</body>
</html>
